[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.30"
evm_version = "osaka"
optimizer = true
optimizer_runs = 200
via_ir = false
offline = true
gas_limit = 1000000000
remappings = [
    "forge-std/=lib/forge-std/src/",
    "base-std/=lib/base-std/src/",
    "base-std-test/=lib/base-std/test/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[fmt]
line_length = 100
tab_width = 4
quote_style = "double"
bracket_spacing = false

